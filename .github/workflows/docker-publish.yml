name: Docker Build & Push

on:
  push:
    branches: [main]

env:
  MAJOR: 0
  MINOR: 2
  IMAGE: 0xj4f/aws-enumerator

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    environment: Development

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # full history for tag counting

      - name: Calculate version
        id: version
        run: |
          # Count existing tags matching this MAJOR.MINOR prefix to determine PATCH
          PATCH=$(git tag -l "v${MAJOR}.${MINOR}.*" | wc -l | tr -d ' ')
          VERSION="${MAJOR}.${MINOR}.${PATCH}"
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "tag=v${VERSION}" >> "$GITHUB_OUTPUT"
          echo "Version: ${VERSION}"

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USER }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ${{ env.IMAGE }}:${{ steps.version.outputs.version }}
            ${{ env.IMAGE }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Create Git tag
        run: |
          git config --global user.email "0xj4f.sh@gmail.com"
          git config --global user.name "0xj4f"
          git tag -a "${{ steps.version.outputs.tag }}" -m "Release ${{ steps.version.outputs.version }}"
          git push origin "${{ steps.version.outputs.tag }}"
